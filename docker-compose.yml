services:
  tor-proxy:
    build: .
    image: tor-proxy:latest
    container_name: tor-proxy
    ports:
      - "8118:8118"
    environment:
      - TOR_INSTANCES=3
      - TOR_IP_REFRESH_INTERVAL=300
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
